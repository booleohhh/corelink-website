<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreLink 3D Asset Model Sandbox</title>
    <style>
        body {
            margin: 0;
            background-color: #0C0C0E;
            color: #b0b4c0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #canvas-container {
            width: 500px;
            height: 500px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #141419 0%, #0C0C0E 100%);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .controls {
            margin-top: 20px;
            z-index: 10;
            text-align: center;
            max-width: 450px;
        }
        p {
            font-size: 14px;
            margin: 5px 0;
            color: #888c9a;
        }
        .status {
            color: #ffaa2a;
            font-weight: 500;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="controls">
        <h3 style="color: #ffffff; margin-bottom: 5px;">CoreLink 3D Geometric Extruder</h3>
        <p>This script reads your image asset pixel-by-pixel, mapping all visible data paths directly into a volumetric 3D model group.</p>
        <div id="status-display" class="status">Locating image profile...</div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const statusDisplay = document.getElementById('status-display');

        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.set(0, 0, 4.5);

        // 2. WebGL Renderer Initialization
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(500, 500);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        // 3. Studio Lighting Arrays (Vibrant Yellow-Orange Bloom Profiles)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
        scene.add(ambientLight);

        const primaryLight = new THREE.PointLight(0xffaa2a, 4, 30);
        primaryLight.position.set(3, 4, 5);
        scene.add(primaryLight);

        const secondaryLight = new THREE.PointLight(0xcc4400, 3, 30);
        secondaryLight.position.set(-3, -2, 2);
        scene.add(secondaryLight);

        const topWhiteLight = new THREE.DirectionalLight(0xffffff, 0.8);
        topWhiteLight.position.set(0, 5, 2);
        scene.add(topWhiteLight);

        // 4. Pixel-to-Geometry Extrusion Lifecycle
        const logoImg = new Image();
        // Point this path to your exact local logo asset location
        logoImg.src = 'src/assets/Android.png';

        // Automatic fallback paths to find the asset locally if files get crossed
        logoImg.onerror = () => {
            if (logoImg.src.includes('src/assets/')) {
                statusDisplay.innerText = "Primary route dropped. Attacking fallback asset root...";
                logoImg.src = 'Android.png';
            } else if (logoImg.src.includes('Android.png')) {
                statusDisplay.innerText = "Fallback root dropped. Testing nested public folders...";
                logoImg.src = 'public/Android.png';
            } else {
                statusDisplay.innerHTML = "❌ Error: Could not read image path.<br>Place this HTML file inside your root project folder.";
            }
        };

        logoImg.onload = () => {
            statusDisplay.innerText = "Asset locked. Scanning pixel configurations...";
            
            const scanCanvas = document.createElement('canvas');
            const scanCtx = scanCanvas.getContext('2d');
            
            // Map grid parsing profile bounds (Higher numbers = Higher resolution 3D mesh data)
            const mapGrid = 96; 
            scanCanvas.width = mapGrid;
            scanCanvas.height = mapGrid;
            
            scanCtx.drawImage(logoImg, 0, 0, mapGrid, mapGrid);
            const pixelData = scanCtx.getImageData(0, 0, mapGrid, mapGrid).data;

            // Material definition matching your glowing yellow-orange look parameters
            const volumetricMaterial = new THREE.MeshPhysicalMaterial({
                color: new THREE.Color('#ffb034'),
                emissive: new THREE.Color('#cc3b00'),
                emissiveIntensity: 0.45,
                metalness: 0.9,
                roughness: 0.12,
                clearcoat: 1.0,
                clearcoatRoughness: 0.05,
                side: THREE.DoubleSide
            });

            // Single unit cube geometry definition
            const boxUnitGeo = new THREE.BoxGeometry(2.2 / mapGrid, 2.2 / mapGrid, 0.35);

            // Create a high-performance unified instanced grid framework
            const dummyMesh = new THREE.Object3D();
            const instancedMeshArray = [];

            // Scan coordinate pixels across alpha and luminance thresholds
            let activeElementCount = 0;
            for (let y = 0; y < mapGrid; y++) {
                for (let x = 0; x < mapGrid; x++) {
                    const idx = (y * mapGrid + x) * 4;
                    const r = pixelData[idx];
                    const g = pixelData[idx+1];
                    const b = pixelData[idx+2];
                    const alpha = pixelData[idx+3];

                    // If pixel matches high white/luminance properties, plot a 3D node coordinate point
                    if (alpha > 40 && (r > 60 || g > 60 || b > 60)) {
                        activeElementCount++;
                    }
                }
            }

            const meshInstance = new THREE.InstancedMesh(boxUnitGeo, volumetricMaterial, activeElementCount);
            
            let currentInstanceIdx = 0;
            for (let y = 0; y < mapGrid; y++) {
                for (let x = 0; x < mapGrid; x++) {
                    const idx = (y * mapGrid + x) * 4;
                    const r = pixelData[idx];
                    const g = pixelData[idx+1];
                    const b = pixelData[idx+2];
                    const alpha = pixelData[idx+3];

                    if (alpha > 40 && (r > 60 || g > 60 || b > 60)) {
                        // Map 2D pixel coordinates cleanly into a balanced 3D space vector matrix
                        const posX = ((x / mapGrid) * 2.2) - 1.1;
                        const posY = (((mapGrid - y) / mapGrid) * 2.2) - 1.1;
                        
                        dummyMesh.position.set(posX, posY, 0);
                        dummyMesh.updateMatrix();
                        meshInstance.setMatrix(currentInstanceIdx++, dummyMesh.matrix);
                    }
                }
            }

            modelGroup.add(meshInstance);
            statusDisplay.innerText = "⚡ Success! Rendering high-definition 3D Model.";
        };

        // 5. Active Animation Processing Runtime Loop
        const clock = new THREE.Clock();
        const animate = () => {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            // Dynamic float tracking animations
            modelGroup.position.y = Math.sin(elapsed * 1.5) * 0.08;
            modelGroup.rotation.y = elapsed * 0.45;
            modelGroup.rotation.x = Math.sin(elapsed * 0.4) * 0.06;

            renderer.render(scene, camera);
        };
        animate();
    </script>
</body>
</html>
